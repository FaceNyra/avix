name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: avix_test
          POSTGRES_USER: avix
          POSTGRES_PASSWORD: avix
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    env:
      APP_ENV: test
      BOT_TOKEN: test-token
      BOT_MODE: polling
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      POSTGRES_DB: avix_test
      POSTGRES_USER: avix
      POSTGRES_PASSWORD: avix
      REDIS_URL: redis://localhost:6379/1
      JWT_SECRET: test-secret
      ADMIN_TELEGRAM_IDS: 1
      TEST_DATABASE_URL: postgresql+asyncpg://avix:avix@localhost:5432/avix_test
      TEST_REDIS_URL: redis://localhost:6379/1
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"
      - run: uv sync --all-extras
      - run: uv run ruff check src tests
      - run: uv run mypy src/app
      - run: uv run pytest -q

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t avix:test .
